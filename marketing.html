document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

color:var(--ink);font-weight:500}\n  h1.hero-title{font-size:clamp(2.5rem,6.2vw,4.6rem);margin:30px auto 0;max-width:16ch;font-weight:600}\n  h1.hero-title .accent{color:var(--accent-bright)}\n  .float-logos{position:absolute;inset:0;pointer-events:none;z-index:3}\n  .float-logos .fl{position:absolute;width:66px;height:66px;border-radius:18px;display:grid;place-items:center;\n    background:var(--panel);border:1px solid var(--line);box-shadow:0 18px 36px -16px rgba(0,0,0,.7);\n    animation:floaty 3.4s ease-in-out infinite}\n  .float-logos .fl img{width:34px;height:34px;object-fit:contain}\n  .float-logos .fl.a{top:150px;left:3.5%;animation-delay:0s}\n  .float-logos .fl.b{top:132px;right:3.5%;animation-delay:.7s}\n  .float-logos .fl.c{top:430px;right:6%;animation-delay:1.3s}\n  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}\n  @media(max-width:760px){.float-logos{display:none}}\n  .hero-sub{max-width:60ch;margin:24px auto 0;color:var(--ink-muted);font-size:clamp(1rem,1.6vw,1.18rem)}\n  .hero-cta{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:34px}\n  .pill-soon{display:inline-flex;align-items:center;gap:10px;border-radius:13px;\n    border:1px solid rgba(124,135,255,.32);background:rgba(124,135,255,.08);\n    color:var(--ink);font-weight:600;font-size:15.5px;padding:14px 22px}\n  .ping{position:relative;width:9px;height:9px}\n  .ping::before{content:\"\";position:absolute;inset:0;border-radius:50%;background:var(--accent);\n    animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}\n  .ping::after{content:\"\";position:absolute;inset:0;border-radius:50%;background:var(--accent)}\n  @keyframes ping{75%,100%{transform:scale(2.4);opacity:0}}\n  .hero-fine{margin-top:18px;font-size:12.5px;color:var(--ink-faint);font-family:var(--mono)}\n\n  /* ---------- product mockup ---------- */\n  .shot{max-width:980px;margin:60px auto 0;position:relative}\n  .shot::after{content:\"\";position:absolute;inset:auto 8% -40px 8 out it —\n        summarize, explain, rewrite, translate, or dig into code, with the page context added automatically.\n      <\u002Fp>\n      <div class=\"hero-cta\">\n        <span class=\"pill-soon\"><span class=\"ping\"><\u002Fspan>Chrome Web Store — coming soon<\u002Fspan>\n        <a href=\"#download\" class=\"btn btn-ghost btn-lg\">Download builds<\u002Fa>\n      <\u002Fdiv>\n      <p class=\"hero-fine\">Free · Your OpenAI / OpenRouter key, your data · No hosted backend<\u002Fp>\n\n      <!-- PRODUCT MOCKUP -->\n      <div class=\"shot\">\n        <div class=\"browser\">\n          <div class=\"browser-bar\">\n            <div class=\"traffic\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n            <div class=\"urlbar\"><span class=\"lock\">●<\u002Fspan>&nbsp;docs.example.com/guide/streaming<\u002Fdiv>\n            <div style=\"width:54px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"browser-body\">\n            <!-- left article -->\n            <div class=\"page-col\">\n              <div class=\"kicker\">Documentation<\u002Fdiv>\n              <h4>Streaming responses with server-sent events<\u002Fh4>\n              <div class=\"lines\">\n                <div class=\"ln\" style=\"width:96%\"><\u002Fdiv>\n                <div class=\"ln soft\" style=\"width:100%\"><\u002Fdiv>\n                <div class=\"ln soft\" style=\"width:88%\"><\u002Fdiv>\n                <div class=\"ln soft\" style=\"width:93%\"><\u002Fdiv>\n                <div class=\"ln soft\" style=\"width:70%\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"sub\"><\u002Fdiv>\n              <div class=\"lines\" style=\"margin-top:16px\">\n                <div class=\"ln soft\" style=\"width:100%\"><\u002Fdiv>\n                <div class=\"ln soft\" style=\"width:84%\"><\u002Fdiv>\n                <div class=\"ln soft\" style=\"width:91%\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <!-- right side panel -->\n            <div class=\"panel-col\">\n              <div class=\"panel-head\">\n                <span class=\"mark\">A<\u002Fspan><span class=\"pname\">Askpane<\u002Fspan>\n                <span class=\"ctx\"><i><\u002Fi>page in context<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"chat\">\n                <div class=\"bub me\">Summarize this article in 3 bullets.<\u002Fdiv>\n                <div class=\"bub ai\">\n                  <b>Here's the gist:<\u002Fb>\n                  <ul>\n                    <li>SSE streams tokens over a single long-lived HTTP connection.<\u002Fli>\n                    <li>The client reads an <span class=\"mono\">EventSource<\u002Fspan> and appends as it arrives.<\u002Fli>\n                    <li>Reconnect logic and backpressure are the main gotchas.<\u002Fli>\n                  <\u002Ful>\n                <\u002Fdiv>\n                <div class=\"chips\">\n                  <span class=\"chip on\">Summarize<\u002Fspan>\n                  <span class=\"chip\">Explain<\u002Fspan>\n                  <span class=\"chip\">Rewrite<\u002Fspan>\n                  <span class=\"chip\">Translate<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"composer\">\n                <span>Ask about this page…<\u002Fspan>\n                <span class=\"kbd\">⌘⇧A<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURES -->\n  <section id=\"features\" class=\"sec\">\n    <div class=\"wrap\">\n      <div class=\"sec-label\">Features<\u002Fdiv>\n      <h2>A reading &amp; research copilot, built into the browser<\u002Fh2>\n      <p class=\"lead\">Made for long-form web content — articles, documentation, technical references, and business pages.<\u002Fp>\n\n      <div class=\"feat-grid\">\n        <article class=\"card\">\n          <span class=\"num\">01<\u002Fspan>\n          <div class=\"ic\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 5h16M4 10h16M4 15h10M4 20h7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Reads the page for you<\u002Fh3>\n          <p>Extracts the readable text of the current tab and uses it as context — no copy-pasting articles, docs, or GitHub pages.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"card\">\n          <span class=\"num\">02<\u002Fspan>\n          <div class=\"ic\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4h16v16H4zM14 4v16\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Side-panel, per tab<\u002Fh3>\n          <p>Opens in Chrome's side panel with its own session per tab, so switching pages never mixes conversations.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"card\">\n          <span class=\"num\">03<\u002Fspan>\n          <div class=\"ic\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Quick actions<\u002Fh3>\n          <p>One click to summarize, explain, rewrite, translate, simplify, or explain code — on the full page, a selection, or pasted text.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"card\">\n          <span class=\"num\">04<\u002Fspan>\n          <div class=\"ic\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 11V7a5 5 0 0 1 10 0v4M5 11h14v9H5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Bring your own key<\u002Fh3>\n          <p>Use your own OpenAI or OpenRouter key. OpenRouter also unlocks Claude, Gemini, and more model families through one key.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"card\">\n          <span class=\"num\">05<\u002Fspan>\n          <div class=\"ic\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3 4 6v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V6z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Local-first &amp; private<\u002Fh3>\n          <p>Keys and chat history are stored locally. Page content is only sent when you ask. Exclude sites or disable history anytime.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"card\">\n          <span class=\"num\">06<\u002Fspan>\n          <div class=\"ic\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v3m0 12v3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1M3 12h3m12 0h3M5.6 18.4l2.1-2.1m8.6-8.6 2.1-2.1\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n          <h3>Your models, your way<\u002Fh3>\n          <p>Choose default providers and models, favorite the ones you use, hide the rest. Streamed responses you can stop mid-answer.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROVIDERS -->\n  <section id=\"providers\" class=\"providers\">\n    <div class=\"wrap\">\n      <div class=\"sec-label\" style=\"display:block;margin-bottom:18px\">Providers<\u002Fdiv>\n      <p>Plug in your own key for <b>OpenAI<\u002Fb>, <b>Anthropic<\u002Fb>, or <b>Google<\u002Fb> — or route all of them through a single <b>OpenRouter<\u002Fb> key.<\u002Fp>\n      <div class=\"prov-row\">\n        <span class=\"prov\"><img src=\"614fa10e-fade-48ce-b1c4-6d747f01d536\" alt=\"\"><span class=\"p
